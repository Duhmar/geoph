{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="glass-card p-5 text-center">
            <h2 class="display-6 text-white mb-2">Welcome Back</h2>
            <p class="text-white opacity-75 mb-4">Log in to share your nature sightings</p>

            <form method="POST" class="glass-form text-start">
                {% csrf_token %}
                <style>
                    form p label { color: white; display: block; margin-top: 15px; font-weight: 600; }
                    form p input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 12px; padding: 12px; width: 100%; }
                </style>
                {{ form.as_p }}
                <div class="mt-4 d-grid">
                    <button type="submit" class="btn btn-aesthetic btn-lg">Sign Up</button>
                </div>
            </form>
            <p class="mt-4 text-white opacity-75">Don't have an account? <a href="{% url 'signup' %}" class="text-warning text-decoration-none">Sign Up</a></p>
        </div>
    </div>
</div>
{% endblock %}
