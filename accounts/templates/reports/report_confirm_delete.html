{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 rounded-4" style="border-top: 5px solid #dc3545 !important;">
            <div class="card-body text-center p-5">
                <h2 class="text-danger mb-3">Confirm Deletion</h2>
                <p class="fs-5 text-secondary">Are you sure you want to permanently delete:</p>
                
                <div class="p-4 my-4 bg-light rounded-3 shadow-sm border">
                    <p class="fs-4 text-dark m-0">"{{ report.title }}"</p>
                </div>
                
                <p class="text-muted small mb-5">This action cannot be undone.</p>
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'report_list' %}" class="btn btn-light border px-4 shadow-sm">Cancel</a>
                        <button type="submit" class="btn btn-danger px-4 shadow-sm">Yes, Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
